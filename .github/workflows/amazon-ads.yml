name: Amazon Ads Auto-Target Pause

on:
  # Run once per hour (at the start of every hour)
  schedule:
    - cron: "0 * * * *"
  
  # Allow manual execution
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pause-targets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create .env.local file
        run: |
          echo "CLIENT_ID=${{ secrets.CLIENT_ID }}" > .env.local
          echo "CLIENT_SECRET=${{ secrets.CLIENT_SECRET }}" >> .env.local
          echo "REFRESH_TOKEN=${{ secrets.REFRESH_TOKEN }}" >> .env.local
          echo "PROFILE_ID=${{ secrets.PROFILE_ID }}" >> .env.local

      - name: Run script (auto-pause targets)
        run: |
          python script.py --apply