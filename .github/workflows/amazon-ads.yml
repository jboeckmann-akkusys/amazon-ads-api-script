name: Amazon Ads Auto-Target Pause

on:
  # Run every 5 minutes
  schedule:
    - cron: "*/5 * * * *"
  
  # Allow manual execution
  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: amazon-ads-script
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pause-targets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create .env.local file
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          PROFILE_ID: ${{ secrets.PROFILE_ID }}
        run: |
          printf 'CLIENT_ID=%s\nCLIENT_SECRET=%s\nREFRESH_TOKEN=%s\nPROFILE_ID=%s\n' "$CLIENT_ID" "$CLIENT_SECRET" "$REFRESH_TOKEN" "$PROFILE_ID" > .env.local
          cat .env.local

      - name: Run script (auto-pause targets)
        run: |
          python script.py --apply